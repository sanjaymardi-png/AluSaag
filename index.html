<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>A Special Surprise for AluSaag</title>
  <style>
    :root {
      --primary-pink: #ff4d6d;
      --deep-red: #c1121f;
      --glass: rgba(255, 255, 255, 0.9);
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #1a1a1a;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow-x: hidden;
      text-align: center;
      color: white;
      transition: background 1s ease;
    }

    .stage {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 90%;
      max-width: 500px;
      animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .glass-card {
      background: var(--glass);
      padding: 30px;
      border-radius: 20px;
      color: #333;
      box-shadow: 0 15px 35px rgba(0,0,0,0.4);
      width: 100%;
    }

    video {
      width: 100%;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      margin-bottom: 20px;
      background: black;
    }

    input {
      padding: 12px;
      width: 80%;
      border: 2px solid #ddd;
      border-radius: 10px;
      margin-bottom: 15px;
      font-size: 16px;
      outline: none;
    }

    .next-btn, .action-btn {
      padding: 15px 35px;
      background: var(--primary-pink);
      color: white;
      border: none;
      border-radius: 50px;
      font-weight: bold;
      cursor: pointer;
      font-size: 16px;
      transition: transform 0.2s;
    }

    .next-btn:hover { transform: scale(1.05); }

    /* Floating Leaves */
    .leaf {
      position: fixed; top: -50px; 
      background: var(--deep-red);
      border-radius: 0% 80%;
      opacity: 0.6;
      pointer-events: none;
      animation: fall linear forwards;
    }

    @keyframes fall {
      to { transform: translateY(110vh) rotate(540deg); }
    }

    #audio-btn {
      position: fixed; top: 20px; right: 20px; z-index: 1000;
      background: white; border: none; border-radius: 50%;
      width: 45px; height: 45px; cursor: pointer; font-size: 20px;
    }
  </style>
</head>
<body>

  <audio id="bg-music" loop>
    <source src="alwayswithmepiano.mp3" type="audio/mpeg">
  </audio>
  <button id="audio-btn" onclick="toggleMusic()">🎵</button>

  <div id="stage-1" class="stage" style="display: flex;">
    <div class="glass-card">
      <h2 id="sec-title">🔒 Verification Required</h2>
      <p id="sec-desc">When is my birthday?<br><small>(e.g., 10 August)</small></p>
      <input type="text" id="passInput" placeholder="Type here...">
      <br>
      <button onclick="checkPass()" class="next-btn">Submit</button>
      <p id="status-msg"></p>
    </div>
  </div>

  <div id="stage-2" class="stage">
    <h2>A little trip down memory lane... 🎥</h2>
    <video id="video1" controls>
      <source src="Vid2.mp4" type="video/mp4">
    </video>
    <button id="btn-v1" class="next-btn" style="display:none;" onclick="goToStage(3)">Next Thing ➔</button>
  </div>

  <div id="stage-3" class="stage">
    <h2>One more thing! ✨</h2>
    <video id="video2" controls>
      <source src="BirthdaySong.mp4" type="video/mp4">
    </video>
    <button id="btn-v2" class="next-btn" style="display:none;" onclick="goToStage(4)">The Big Surprise ➔</button>
  </div>

  <div id="stage-4" class="stage">
    <div class="glass-card">
      <div style="font-size:70px">😸</div>
      <h1 id="final-msg" style="color:#c9184a; font-size:22px;">Happy Birthday, AluSaag! 🎂<br>Are you giving me a treat?</h1>
      
      <div id="buttonContainer">
        <button id="yesBtn" class="action-btn">YES</button>
        <button id="noBtn" class="action-btn" style="background:#8d99ae;">Nooo</button>
      </div>

      <div id="captchaArea" style="display:none; margin-top:20px;">
        <p><b>YAY! Where are we going?</b></p>
        <input type="text" id="treatAnswer" placeholder="Restaurant name...">
        <br>
        <button onclick="sendRSVP()" class="action-btn" style="background:#4CAF50;">Confirm & Send 📲</button>
      </div>
    </div>
  </div>

  <script>
    let securityStep = 1;
    const correctBirthday = "14 May"; 
    const correctPlace = "Tuition"; 

    function goToStage(num) {
      document.querySelectorAll('.stage').forEach(s => s.style.display = 'none');
      const next = document.getElementById(`stage-${num}`);
      next.style.display = 'flex';
      
      if(num === 4) {
        document.body.style.background = "#ffb3c1";
        startLeaves();
      }
    }

    function checkPass() {
      const val = document.getElementById('passInput').value.toLowerCase().trim();
      const status = document.getElementById('status-msg');
      const desc = document.getElementById('sec-desc');
      const title = document.getElementById('sec-title');

      if (securityStep === 1) {
        if (val === correctBirthday) {
          securityStep = 2;
          document.getElementById('passInput').value = "";
          title.innerText = "🕵️ Just making sure...";
          desc.innerHTML = "Where did we first meet?<br><small>(Hint: The Park)</small>";
          status.innerText = "";
        } else {
          status.innerText = "Wrong date! Are you an imposter??";
          status.style.color = "red";
        }
      } else {
        if (val === correctPlace) {
          goToStage(2);
          try { document.getElementById('bg-music').play(); } catch(e){}
        } else {
          status.innerText = "Nope! That's not right. Who are you??";
        }
      }
    }

    // Video Listeners
    document.getElementById('video1').onended = () => document.getElementById('btn-v1').style.display = 'block';
    document.getElementById('video2').onended = () => document.getElementById('btn-v2').style.display = 'block';

    // The No Button Logic
    const noBtn = document.getElementById('noBtn');
    let noCount = 0;

    noBtn.addEventListener('mouseover', () => {
      if (noCount > 2) {
        const x = Math.random() * (window.innerWidth - 100);
        const y = Math.random() * (window.innerHeight - 100);
        noBtn.style.position = 'fixed';
        noBtn.style.left = x + 'px';
        noBtn.style.top = y + 'px';
      }
    });

    noBtn.addEventListener('click', () => {
      noCount++;
      if (noCount === 1) document.getElementById('final-msg').innerText = "Taras khao na mujh pe... 🥺";
      if (noCount === 3) noBtn.innerText = "🐸 NO";
    });

    document.getElementById('yesBtn').addEventListener('click', () => {
      if (noCount < 3) {
        alert("Try clicking 'No' first, it's funny! 😈");
      } else {
        document.getElementById('buttonContainer').style.display = 'none';
        document.getElementById('captchaArea').style.display = 'block';
        document.getElementById('final-msg').innerText = "I knew it! ❤️";
      }
    });

    function sendRSVP() {
      const place = document.getElementById('treatAnswer').value;
      if(!place) return alert("Tell me the place!");
      window.open(`https://wa.me/917856978442?text=Happy Birthday! I'm taking you to ${encodeURIComponent(place)} 🎂`);
    }

    function toggleMusic() {
      const m = document.getElementById('bg-music');
      if (m.paused) m.play(); else m.pause();
    }

    function startLeaves() {
      for(let i=0; i<25; i++) {
        let l = document.createElement('div');
        l.className = 'leaf';
        l.style.left = Math.random() * 100 + 'vw';
        l.style.width = l.style.height = (Math.random()*15+10)+'px';
        l.style.animationDuration = (Math.random()*3+2)+'s';
        l.style.animationDelay = Math.random()*2+'s';
        document.body.appendChild(l);
      }
    }
  </script>
</body>
</html>
