<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Happy Birthday, AluSaag!</title>
  <style>
    :root {
      --primary-pink: #ff4d6d;
      --deep-red: #c1121f;
      --wa-green: #25D366;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background-color: #121212;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow-x: hidden;
      color: white;
      padding: 20px;
      box-sizing: border-box;
    }

    .stage {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 450px;
      text-align: center;
    }

    /* Stage 3 is now active by default */
    #stage-3 { display: flex; }

    .glass-card {
      background: rgba(255, 255, 255, 0.95);
      padding: 35px 25px;
      border-radius: 24px;
      color: #333;
      box-shadow: 0 15px 35px rgba(0,0,0,0.4);
      width: 100%;
      position: relative;
      z-index: 10;
    }

    .btn {
      padding: 15px 35px;
      border: none;
      border-radius: 50px;
      font-weight: bold;
      cursor: pointer;
      font-size: 16px;
      width: 100%;
      max-width: 280px;
      margin: 10px auto;
      display: block;
    }

    .btn-primary {
      background: var(--primary-pink);
      color: white;
      box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4);
    }

    .btn-next {
      display: none;
      margin-top: 20px;
    }

    video {
      width: 100%;
      max-width: 450px;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
      background: black;
      pointer-events: none;
      user-select: none;
    }

    .leaf {
      position: fixed; top: -20px; background: var(--deep-red);
      border-radius: 0% 80%; opacity: 0.8; z-index: 1;
      animation: fall linear infinite;
    }
    
    @keyframes fall { to { transform: translateY(110vh) rotate(720deg); } }

    #audio-btn {
      position: fixed; top: 20px; right: 20px; z-index: 100;
      background: white; border: none; border-radius: 50%;
      width: 45px; height: 45px; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      font-size: 20px; cursor: pointer;
    }

    .whatsapp-link {
      background: var(--wa-green);
      color: white;
      text-decoration: none;
      padding: 15px;
      border-radius: 15px;
      display: block;
      margin-top: 15px;
      font-weight: bold;
      box-shadow: 0 5px 15px rgba(37, 211, 102, 0.4);
    }

    #game-buttons {
      display: flex;
      gap: 15px;
      justify-content: center;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    #game-buttons .btn {
      flex: 1;
      min-width: 100px;
      max-width: 120px;
    }

    @media (max-width: 480px) {
      body { padding: 10px; }
      .glass-card { padding: 25px 20px; }
      video { max-width: 100%; }
    }
  </style>
</head>
<body>

  <button id="audio-btn" style="display:none;">🔇</button>

  <!-- SKIPPED: Stage 1 & 2 completely removed -->

  <div id="stage-3" class="stage">
    <h2 style="margin-bottom:20px;">Memories part II... ✨</h2>
    <video id="video2" preload="metadata">
      <source src="video2.mp4" type="video/mp4">
      <p>Tap to play video or Next!</p>
    </video>
    <button id="btn-to-final" class="btn btn-primary btn-next" onclick="goToStage(4)">The Big Surprise ➔</button>
  </div>

  <div id="stage-4" class="stage">
    <div class="glass-card">
      <div id="kitty" style="font-size:80px; margin-bottom:10px;">😸</div>
      <h1 id="game-msg" style="color: #c9184a; font-size: 22px; line-height: 1.4;">
        Happy Birthday, AluSaag! 🎂<br>I've been waiting for this... are you giving me a treat?
      </h1>
      
      <div id="game-buttons">
        <button id="yesBtn" class="btn btn-primary">YES</button>
        <button id="noBtn" class="btn" style="background:#8d99ae;">Nooo</button>
      </div>

      <div id="treat-box" style="display:none; margin-top:20px;">
        <p style="font-weight:bold;">Where are we going then? 😋</p>
        <input type="text" id="treatInput" placeholder="Name of the restaurant...">
        <button id="submitTreat" class="btn" style="background:#4CAF50;">Submit RSVP</button>
      </div>

      <div id="rsvp-container"></div>
    </div>
  </div>

  <audio id="bg-music" loop src="alwayswithmepiano.mp3"></audio>

  <script>
    let audioPlaying = false;

    // Stage navigation (now only 3->4)
    function goToStage(num) {
      document.querySelectorAll('video').forEach(vid => vid.pause());
      document.querySelectorAll('.stage').forEach(s => s.style.display = 'none');
      
      const nextStage = document.getElementById('stage-' + num);
      if (nextStage) {
        nextStage.style.display = 'flex';
      }

      if (num === 4) {
        document.body.style.background = "url('https://images.unsplash.com/photo-1443632864897-14973fa006cf?q=80&w=1920&auto=format&fit=crop') no-repeat center center/cover";
        document.getElementById('audio-btn').style.display = 'block';
        startLeaves();
      }
    }

    // FIXED VIDEO 2 HANDLING
    const video2 = document.getElementById('video2');
    const btnToFinal = document.getElementById('btn-to-final');
    
    video2.addEventListener('ended', () => {
      btnToFinal.style.display = 'block';
    });
    
    // Mobile/touch friendly play
    video2.addEventListener('click', () => video2.play());
    video2.addEventListener('touchstart', (e) => {
      e.preventDefault();
      if (video2.paused) video2.play();
    });
    
    // 30s fallback
    setTimeout(() => {
      if (video2.ended || video2.paused) {
        btnToFinal.style.display = 'block';
      }
    }, 30000);

    // BIRTHDAY GAME LOGIC
    const noBtn = document.getElementById('noBtn');
    const yesBtn = document.getElementById('yesBtn');
    let noClicks = 0;
    let isJumping = false;

    function moveNo() {
      if (!isJumping) return;
      noBtn.style.position = 'fixed';
      noBtn.style.zIndex = '1000';
      noBtn.style.left = Math.random() * (window.innerWidth - 100) + 'px';
      noBtn.style.top = Math.random() * (window.innerHeight - 100) + 'px';
    }

    noBtn.addEventListener('click', () => {
      if (isJumping) return;
      noClicks++;
      if (noClicks === 1) {
        document.getElementById('game-msg').innerText = "Taras khao na mujh pe... 🥺";
        document.getElementById('kitty').innerText = "🥺";
      }
      if (noClicks >= 3) {
        isJumping = true;
        noBtn.innerHTML = "🐸 NO";
        noBtn.style.background = "#4CAF50";
        moveNo();
      }
    });

    noBtn.addEventListener('mouseenter', moveNo);
    noBtn.addEventListener('touchstart', (e) => { 
      if(isJumping) { e.preventDefault(); moveNo(); } 
    });

    yesBtn.addEventListener('click', () => {
      document.getElementById('game-buttons').style.display = 'none';
      document.getElementById('game-msg').innerHTML = "I knew you'd say yes! ❤️<br>You're the best, AluSaag.";
      document.getElementById('kitty').innerText = "🥔😻🥔";
      document.getElementById('treat-box').style.display = 'block';
    });

    document.getElementById('submitTreat').addEventListener('click', () => {
      const val = document.getElementById('treatInput').value.trim();
      if (!val) {
        alert("You have to tell me where we're going!");
        return;
      }
      const link = `https://wa.me/917856978442?text=Okay fine! I'm taking you to ${encodeURIComponent(val)} 🎂`;
      document.getElementById('treat-box').style.display = 'none';
      document.getElementById('rsvp-container').innerHTML = `<a href="${link}" target="_blank" class="whatsapp-link">Confirm on WhatsApp 📲</a>`;
    });

    // LEAVES EFFECT
    function startLeaves() {
      for (let i = 0; i < 25; i++) {
        const leaf = document.createElement('div');
        leaf.className = 'leaf';
        leaf.style.left = Math.random() * 100 + 'vw';
        leaf.style.width = leaf.style.height = (Math.random() * 15 + 10) + 'px';
        leaf.style.animationDuration = (Math.random() * 3 + 2) + 's';
        leaf.style.animationDelay = Math.random() * 5 + 's';
        document.body.appendChild(leaf);
      }
    }

    // FIXED AUDIO TOGGLE
    const audio = document.getElementById('bg-music');
    const audioBtn = document.getElementById('audio-btn');
    
    audioBtn.onclick = function() {
      if (audio.paused) { 
        audio.play().catch(e => console.log('Audio play failed'));
        this.innerText = "🔊";
        audioPlaying = true;
      } else { 
        audio.pause(); 
        this.innerText = "🔇";
        audioPlaying = false;
      }
    };
  </script>
</body>
</html>
